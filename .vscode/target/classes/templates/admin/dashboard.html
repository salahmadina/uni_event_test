<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - UniEvents</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .badge-cancelled { background: #dc3545; color: #fff; padding: 3px 8px; border-radius: 4px; font-size: .78rem; }
        .stat-card.danger { border-left: 4px solid #dc3545; }
    </style>
</head>
<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="page-container">
        <div class="page-header">
            <div>
                <h2>Admin Dashboard</h2>
                <p>Welcome, <span th:text="${admin.name}"></span></p>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" th:text="${totalEvents}">0</div>
                <div class="stat-label">Total Events</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" th:text="${totalBookings}">0</div>
                <div class="stat-label">Total Bookings</div>
            </div>
            <div class="stat-card highlight">
                <div class="stat-number" th:text="${pendingCount}">0</div>
                <div class="stat-label">Pending Payments</div>
            </div>
            <div class="stat-card danger">
                <div class="stat-number" th:text="${cancelledCount}">0</div>
                <div class="stat-label">Cancelled Events</div>
            </div>
        </div>

        <div class="quick-actions">
            <a th:href="@{/admin/events/new}" class="btn btn-primary">+ Add New Event</a>
            <a th:href="@{/admin/events}"     class="btn btn-outline">Manage Events</a>
            <a th:href="@{/admin/bookings}"   class="btn btn-outline">View Bookings</a>
        </div>

        <div class="section-title">All Events</div>
        <div class="table-wrapper">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Event Name</th>
                        <th>Date</th>
                        <th>Price</th>
                        <th>Seats</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="event : ${events}">
                        <td th:text="${event.name}"></td>
                        <td th:text="${#temporals.format(event.eventDate, 'dd MMM yyyy')}"></td>
                        <td>
                            <span th:if="${event.free}">FREE</span>
                            <span th:unless="${event.free}" th:text="'$' + ${event.price}"></span>
                        </td>
                        <td>
                            <span th:if="${event.unlimited}">Unlimited</span>
                            <span th:unless="${event.unlimited}"
                                  th:text="${event.bookedSeats} + '/' + ${event.totalSeats}"></span>
                        </td>
                        <td>
                            <span th:switch="${event.status.name()}">
                                <span th:case="'UPCOMING'"  class="badge badge-success">UPCOMING</span>
                                <span th:case="'POSTPONED'" class="badge badge-warning">POSTPONED</span>
                                <span th:case="'PAST'"      class="badge badge-grey">PAST</span>
                                <span th:case="'CANCELLED'" class="badge badge-cancelled">CANCELLED</span>
                            </span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
